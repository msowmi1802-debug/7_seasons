{% extends "base.html" %}

{% block content %}

<div class="form-container">

    <h2>Create Account</h2>

    <form method="POST">

        <input
            type="text"
            name="name"
            placeholder="Full Name"
            required>

        <input
            type="email"
            name="email"
            placeholder="Email Address"
            required>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        <input
            type="password"
            name="confirm_password"
            placeholder="Confirm Password"
            required>

        <button type="submit">
            Create Account
        </button>

    </form>

</div>

{% endblock %}
